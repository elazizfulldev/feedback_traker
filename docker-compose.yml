services:

  # ── MySQL Database ────────────────────────────
  db:
    image: mysql:8.0
    container_name: feedbackos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-feedback_tracker}
      MYSQL_USER: ${DB_USERNAME:-feedbackos}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel API ───────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feedbackos-api
    restart: unless-stopped
    environment:
      APP_NAME: "FeedbackOS"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-feedback_tracker}
      DB_USERNAME: ${DB_USERNAME:-feedbackos}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SANCTUM_STATEFUL_DOMAINS: "localhost,localhost:3000,localhost:5173"
      SESSION_DOMAIN: localhost
      FRONTEND_URL: http://localhost:3000
    volumes:
      - api_storage:/var/www/html/storage/app/public
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedbackos-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
  api_storage:
